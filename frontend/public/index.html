<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />

    <!-- SEO -->
    <meta
      name="description"
      content="DristiVision - AI Powered Face Detection to identify real vs fake images using deep learning."
    />

    <!-- Title -->
    <title>DristiVision - AI Face Detector</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Smooth UI Styling -->
    <style>
      body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        overflow-x: hidden;
      }

      /* Loader */
      #loader {
        position: fixed;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      /* Fade Animation */
      .fade-out {
        animation: fadeOut 1s forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }
    </style>
  </head>

  <body>
    <!-- Loader Screen -->
    <div id="loader">🚀 Loading DristiVision...</div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Script to remove loader -->
    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");
        loader.classList.add("fade-out");
      });
    </script>
  </body>
</html>
